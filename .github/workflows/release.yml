name: Release

# Publishes a Foundry-installable release whenever you push a version tag, e.g.
#   git tag v1.2.0 && git push origin v1.2.0
# It stamps module.json with the tag's version + that release's download URL, zips the
# module, and attaches module.json + module.zip to the GitHub Release. The manifest URL
# (.../releases/latest/download/module.json) always points at the newest release, so
# Foundry offers users the update automatically.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version + download URL into module.json
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          node -e '
            const fs = require("fs");
            const m = JSON.parse(fs.readFileSync("module.json", "utf8"));
            m.version  = process.env.TAG.replace(/^v/, "");
            m.manifest = `https://github.com/${process.env.REPO}/releases/latest/download/module.json`;
            m.download = `https://github.com/${process.env.REPO}/releases/download/${process.env.TAG}/module.zip`;
            fs.writeFileSync("module.json", JSON.stringify(m, null, 2) + "\n");
          '

      - name: Extract release notes from CHANGELOG.md
        env:
          TAG: ${{ github.ref_name }}
        run: |
          node <<'NODE'
            const fs = require("fs");
            const version = process.env.TAG.replace(/^v/, "");
            const changelog = fs.readFileSync("CHANGELOG.md", "utf8");
            const escaped = version.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const heading = new RegExp(`^## \\[${escaped}\\][^\\r\\n]*\\r?\\n`, "m");
            const match = changelog.match(heading);

            if (!match) throw new Error(`CHANGELOG.md has no section for ${process.env.TAG}`);

            const tail = changelog.slice(match.index + match[0].length);
            const next = tail.search(/^## \[/m);
            const notes = (next === -1 ? tail : tail.slice(0, next)).trim();

            if (!notes) throw new Error(`CHANGELOG.md section for ${process.env.TAG} is empty`);

            fs.writeFileSync("release-notes.md", `${notes}\n`);
          NODE

      - name: Build module.zip
        run: zip -r module.zip module.json scripts styles templates lang assets packs README.md LICENSE

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            module.json
            module.zip
